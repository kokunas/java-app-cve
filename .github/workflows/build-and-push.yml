name: Build and publish container image

# Packaging only - builds the Dockerfile and publishes the artifact to
# GHCR so it exists somewhere Concert (or OpenShift) can pull it from.
# The actual scan / prioritize / remediate / verify / notify lifecycle
# lives in concert-workflows/ as real Concert Workflows, not here.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
