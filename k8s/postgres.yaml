apiVersion: apps/v1
kind: Deployment
metadata:
  name: bankdemo-db
  namespace: banco-kokunas
  labels:
    app.kubernetes.io/name: bankdemo-db
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: banco-kokunas
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bankdemo-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bankdemo-db
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: banco-kokunas
    spec:
      containers:
        # Stock postgres:16-alpine (same image as docker-compose.yml). Its
        # entrypoint chmods the data dir as its own owner, which fails
        # under OpenShift's default "restricted" SCC (arbitrary non-root
        # UID that doesn't own the volume). This namespace's default
        # service account is granted the "anyuid" SCC (see k8s/README or
        # the "oc adm policy add-scc-to-user anyuid -z default" step in the
        # top-level README) so it can run as the UID the image expects,
        # exactly like it does locally under plain Docker/Podman.
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: bankdemo-db-credentials
                  key: DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: bankdemo-db-credentials
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bankdemo-db-credentials
                  key: DB_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
---
# PRIVATE access point: no external exposure, only reachable inside the cluster
# from the bankdemo-app workload. This is what should surface in Concert's
# Arena view as an internal/private dependency of the "bankdemo" application.
apiVersion: v1
kind: Service
metadata:
  name: bankdemo-db
  namespace: banco-kokunas
  labels:
    app.kubernetes.io/name: bankdemo-db
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: banco-kokunas
    concert.ibm.com/exposure: private
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: bankdemo-db
  ports:
    - port: 5432
      targetPort: 5432
